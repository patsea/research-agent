<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Eval — Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Mono', 'Menlo', monospace; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 280px; min-width: 280px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
  #sidebar-header { padding: 12px 16px; border-bottom: 1px solid #0f3460; background: #0f3460; }
  #sidebar-header h2 { font-size: 14px; color: #94a3b8; font-weight: 500; }
  #review-counter { font-size: 12px; color: #64748b; margin-top: 4px; }
  #contact-list { flex: 1; overflow-y: auto; }
  .sidebar-item { padding: 8px 16px; cursor: pointer; border-bottom: 1px solid #1a1a2e; transition: background 0.15s; }
  .sidebar-item:hover { background: #1e3a5f; }
  .sidebar-item.active { background: #1e3a5f; border-left: 3px solid #3b82f6; }
  .sidebar-item.reviewed { opacity: 0.5; }
  .sidebar-item.reviewed.active { opacity: 1; }
  .sidebar-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
  .sidebar-company { font-size: 11px; color: #64748b; margin-top: 2px; }
  .sidebar-verdict-badge { font-size: 10px; display: inline-block; margin-top: 2px; padding: 1px 6px; border-radius: 3px; }
  .badge-confirmed { background: #166534; color: #86efac; }
  .badge-wrong { background: #7f1d1d; color: #fca5a5; }
  .badge-advisory { background: #713f12; color: #fde047; }
  .badge-portfolio { background: #312e81; color: #a5b4fc; }

  /* Main panel */
  #main { flex: 1; overflow-y: auto; padding: 24px 32px; }
  #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  #contact-counter { font-size: 13px; color: #64748b; }
  .nav-btns button { background: #1e3a5f; border: 1px solid #3b82f6; color: #93c5fd; padding: 6px 16px; margin-left: 8px; cursor: pointer; border-radius: 4px; font-size: 12px; }
  .nav-btns button:hover { background: #2563eb; color: #fff; }

  /* Identity row */
  #identity { margin-bottom: 16px; }
  #identity h1 { font-size: 22px; color: #f1f5f9; display: inline; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; vertical-align: middle; }
  .badge-confidence { background: #065f46; color: #6ee7b7; }
  .badge-role { background: #312e81; color: #a5b4fc; }

  /* Two-column detail */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .detail-item label { font-size: 10px; text-transform: uppercase; color: #64748b; display: block; margin-bottom: 2px; }
  .detail-item span { font-size: 13px; color: #cbd5e1; }
  .detail-item a { color: #60a5fa; text-decoration: none; }
  .detail-item a:hover { text-decoration: underline; }

  /* Scrollable sections */
  .section { margin-bottom: 16px; }
  .section h3 { font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
  .scroll-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 4px; padding: 10px 12px; max-height: 180px; overflow-y: auto; font-size: 13px; line-height: 1.5; color: #cbd5e1; white-space: pre-wrap; }
  .scroll-box.short { max-height: 140px; }
  .scroll-box.empty { color: #475569; font-style: italic; }

  /* Verdict */
  #verdict-section { margin-bottom: 16px; }
  #verdict-section h3 { font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }
  .verdict-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .verdict-btn { padding: 8px 16px; border: 2px solid #334155; background: #1e293b; color: #cbd5e1; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .verdict-btn:hover { border-color: #64748b; }
  .verdict-btn.selected { border-color: #3b82f6; background: #1e3a5f; color: #93c5fd; }
  .verdict-btn.v-confirmed.selected { border-color: #22c55e; background: #14532d; color: #86efac; }
  .verdict-btn.v-wrong.selected { border-color: #ef4444; background: #7f1d1d; color: #fca5a5; }
  .verdict-btn.v-advisory.selected { border-color: #eab308; background: #713f12; color: #fde047; }
  .verdict-btn.v-portfolio.selected { border-color: #818cf8; background: #312e81; color: #a5b4fc; }

  #correct-company-row { margin-top: 8px; display: none; }
  #correct-company-row.show { display: block; }
  #correct-company-row input { width: 300px; padding: 6px 10px; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 4px; font-size: 13px; }

  #notes-row { margin-top: 8px; }
  #notes-row input { width: 100%; padding: 6px 10px; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 4px; font-size: 13px; }

  #save-btn { margin-top: 12px; padding: 8px 24px; background: #2563eb; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
  #save-btn:hover { background: #1d4ed8; }
  #save-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  #save-status { font-size: 12px; color: #22c55e; margin-left: 12px; display: inline-block; }

  #export-link { display: block; margin-top: 16px; font-size: 12px; color: #64748b; }
  #export-link a { color: #60a5fa; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Contact Eval</h2>
    <div id="review-counter">0 / 0 reviewed</div>
  </div>
  <div id="contact-list"></div>
</div>

<div id="main">
  <div id="top-bar">
    <span id="contact-counter">Contact 0 of 0</span>
    <div class="nav-btns">
      <button onclick="navPrev()">Previous</button>
      <button onclick="navNext()">Next</button>
    </div>
  </div>

  <div id="identity">
    <h1 id="c-name">—</h1>
    <span class="badge badge-confidence" id="c-confidence"></span>
    <span class="badge badge-role" id="c-role"></span>
  </div>

  <div class="detail-grid">
    <div class="detail-item"><label>Job Title</label><span id="c-title">—</span></div>
    <div class="detail-item"><label>Company</label><span id="c-company">—</span></div>
    <div class="detail-item"><label>Email</label><span id="c-email">—</span></div>
    <div class="detail-item"><label>LinkedIn</label><span id="c-linkedin">—</span></div>
  </div>

  <div class="section">
    <h3>LinkedIn About</h3>
    <div class="scroll-box" id="c-linkedin-summary"></div>
  </div>

  <div class="section">
    <h3 id="company-section-title">About Company</h3>
    <div class="scroll-box short" id="c-company-desc"></div>
  </div>

  <div id="verdict-section">
    <h3>Verdict</h3>
    <div class="verdict-btns">
      <button class="verdict-btn v-confirmed" data-verdict="confirmed" onclick="selectVerdict('confirmed')">&#10003; Confirmed</button>
      <button class="verdict-btn v-wrong" data-verdict="wrong_company" onclick="selectVerdict('wrong_company')">&#10007; Wrong Company</button>
      <button class="verdict-btn v-advisory" data-verdict="advisory_only" onclick="selectVerdict('advisory_only')">&#9670; Advisory Only</button>
      <button class="verdict-btn v-portfolio" data-verdict="portfolio_co" onclick="selectVerdict('portfolio_co')">&#11055; Portfolio Co</button>
    </div>
    <div id="correct-company-row">
      <input type="text" id="correct-company" placeholder="Correct company name">
    </div>
    <div id="notes-row">
      <input type="text" id="notes" placeholder="Notes (optional)">
    </div>
  </div>

  <div>
    <button id="save-btn" onclick="saveVerdict()" disabled>Save Verdict</button>
    <span id="save-status"></span>
  </div>

  <div id="export-link">
    <a href="/api/eval/export.csv">Export CSV</a>
  </div>
</div>

<script>
let contacts = [];
let verdicts = {};
let currentIdx = 0;
let selectedVerdict = null;

async function init() {
  const [cResp, vResp] = await Promise.all([
    fetch('/api/eval/contacts').then(r => r.json()),
    fetch('/api/eval/verdicts').then(r => r.json()),
  ]);
  contacts = cResp.contacts || [];
  for (const v of (vResp.verdicts || [])) {
    verdicts[v.record_id] = v;
  }
  renderSidebar();
  if (contacts.length > 0) showContact(0);
  updateCounter();
}

function renderSidebar() {
  const list = document.getElementById('contact-list');
  list.innerHTML = '';
  contacts.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (verdicts[c.record_id] ? ' reviewed' : '') + (i === currentIdx ? ' active' : '');
    div.dataset.idx = i;

    let html = `<div class="sidebar-name">${esc(c.name || '—')}</div>`;
    html += `<div class="sidebar-company">${esc(c.company_name || '—')}</div>`;
    const v = verdicts[c.record_id];
    if (v) {
      const cls = { confirmed: 'badge-confirmed', wrong_company: 'badge-wrong', advisory_only: 'badge-advisory', portfolio_co: 'badge-portfolio' }[v.verdict] || '';
      html += `<span class="sidebar-verdict-badge ${cls}">${esc(v.verdict)}</span>`;
    }
    div.innerHTML = html;
    div.onclick = () => showContact(i);
    list.appendChild(div);
  });
}

function showContact(idx) {
  if (idx < 0 || idx >= contacts.length) return;
  currentIdx = idx;
  const c = contacts[idx];

  document.getElementById('c-name').textContent = c.name || '—';
  document.getElementById('c-confidence').textContent = c.confidence || '';
  document.getElementById('c-confidence').style.display = c.confidence ? '' : 'none';
  document.getElementById('c-role').textContent = c.role_type || '';
  document.getElementById('c-role').style.display = c.role_type ? '' : 'none';
  document.getElementById('c-title').textContent = c.job_title || '—';

  const companyEl = document.getElementById('c-company');
  if (c.company_url) {
    companyEl.innerHTML = `<a href="${esc(c.company_url)}" target="_blank">${esc(c.company_name || '—')} &#8599;</a>`;
  } else {
    companyEl.textContent = c.company_name || '—';
  }

  const emailEl = document.getElementById('c-email');
  if (c.email) {
    emailEl.innerHTML = `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`;
  } else {
    emailEl.textContent = '—';
  }

  const linkedinEl = document.getElementById('c-linkedin');
  if (c.linkedin_url) {
    linkedinEl.innerHTML = `<a href="${esc(c.linkedin_url)}" target="_blank">Profile &#8599;</a>`;
  } else {
    linkedinEl.textContent = '—';
  }

  const summaryEl = document.getElementById('c-linkedin-summary');
  if (c.linkedin_summary) {
    summaryEl.textContent = c.linkedin_summary;
    summaryEl.classList.remove('empty');
  } else {
    summaryEl.textContent = 'No LinkedIn summary available';
    summaryEl.classList.add('empty');
  }

  const descEl = document.getElementById('c-company-desc');
  document.getElementById('company-section-title').textContent = `About ${c.company_name || 'Company'}`;
  if (c.company_description) {
    descEl.textContent = c.company_description;
    descEl.classList.remove('empty');
  } else {
    descEl.textContent = 'No company description available';
    descEl.classList.add('empty');
  }

  // Restore existing verdict if any
  const existing = verdicts[c.record_id];
  selectedVerdict = existing?.verdict || null;
  document.getElementById('correct-company').value = existing?.correct_company || '';
  document.getElementById('notes').value = existing?.notes || '';

  // Update verdict button states
  document.querySelectorAll('.verdict-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.verdict === selectedVerdict);
  });
  document.getElementById('correct-company-row').classList.toggle('show', selectedVerdict === 'wrong_company');
  document.getElementById('save-btn').disabled = !selectedVerdict;

  // Counter
  document.getElementById('contact-counter').textContent = `Contact ${idx + 1} of ${contacts.length}`;
  document.getElementById('save-status').textContent = '';

  // Sidebar highlight
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  // Auto-scroll sidebar
  const activeEl = document.querySelector('.sidebar-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
}

function selectVerdict(v) {
  selectedVerdict = v;
  document.querySelectorAll('.verdict-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.verdict === v);
  });
  document.getElementById('correct-company-row').classList.toggle('show', v === 'wrong_company');
  document.getElementById('save-btn').disabled = false;
}

async function saveVerdict() {
  if (!selectedVerdict) return;
  const c = contacts[currentIdx];
  const body = {
    record_id: c.record_id,
    name: c.name,
    verdict: selectedVerdict,
    correct_company: document.getElementById('correct-company').value || null,
    notes: document.getElementById('notes').value || null,
  };

  const resp = await fetch('/api/eval/verdict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (resp.ok) {
    verdicts[c.record_id] = body;
    document.getElementById('save-status').textContent = 'Saved';
    updateCounter();
    renderSidebar();

    // Auto-advance to next unreviewed
    setTimeout(() => {
      const nextUnreviewed = contacts.findIndex((c, i) => i > currentIdx && !verdicts[c.record_id]);
      if (nextUnreviewed >= 0) {
        showContact(nextUnreviewed);
      } else {
        // Try from beginning
        const fromStart = contacts.findIndex(c => !verdicts[c.record_id]);
        if (fromStart >= 0) showContact(fromStart);
      }
    }, 300);
  } else {
    document.getElementById('save-status').textContent = 'Error saving';
  }
}

function updateCounter() {
  const reviewed = contacts.filter(c => verdicts[c.record_id]).length;
  document.getElementById('review-counter').textContent = `${reviewed} / ${contacts.length} reviewed`;
}

function navPrev() { if (currentIdx > 0) showContact(currentIdx - 1); }
function navNext() { if (currentIdx < contacts.length - 1) showContact(currentIdx + 1); }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ']') navNext();
  if (e.key === 'ArrowLeft' || e.key === '[') navPrev();
});

init();
</script>
</body>
</html>
