<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Eval — Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Mono', 'Menlo', monospace; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 260px; min-width: 260px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
  #sidebar-header { padding: 14px 16px; border-bottom: 1px solid #0f3460; background: #0f3460; }
  #sidebar-header h2 { font-size: 16px; color: #e2e8f0; font-weight: 600; }
  #review-counter { font-size: 16px; color: #94a3b8; margin-top: 6px; font-weight: 500; }
  #contact-list { flex: 1; overflow-y: auto; }
  .sidebar-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #1a1a2e; border-left: 3px solid transparent; transition: background 0.15s; }
  .sidebar-item:hover { background: #1e3a5f; }
  .sidebar-item.active { background: #1e3a5f22; border-left-color: #3b82f6; }
  .sidebar-item.reviewed { opacity: 0.5; }
  .sidebar-item.reviewed.active { opacity: 1; }
  .sidebar-name { font-size: 15px; font-weight: 600; color: #e2e8f0; }
  .sidebar-company { font-size: 13px; color: #64748b; margin-top: 3px; }
  .sidebar-check { color: #22c55e; margin-left: 4px; font-size: 12px; }
  .sidebar-verdict-badge { font-size: 11px; display: inline-block; margin-top: 3px; padding: 2px 7px; border-radius: 3px; }
  .badge-confirmed { background: #166534; color: #86efac; }
  .badge-wrong { background: #7f1d1d; color: #fca5a5; }
  .badge-advisory { background: #713f12; color: #fde047; }
  .badge-portfolio { background: #312e81; color: #a5b4fc; }

  /* Main panel */
  #main { flex: 1; overflow-y: auto; padding: 28px 36px; }
  #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  #contact-counter { font-size: 16px; color: #94a3b8; }
  .nav-btns button { background: #1e3a5f; border: 1px solid #3b82f6; color: #93c5fd; padding: 10px 20px; height: 40px; margin-left: 8px; cursor: pointer; border-radius: 6px; font-size: 14px; font-weight: 500; }
  .nav-btns button:hover { background: #2563eb; color: #fff; }

  /* Identity row */
  #identity { margin-bottom: 20px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  #identity h1 { font-size: 28px; color: #f1f5f9; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 13px; }
  .badge-confidence { background: #065f46; color: #6ee7b7; }
  .badge-role { background: #312e81; color: #a5b4fc; }

  /* Two-column detail */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .detail-item { min-height: 48px; }
  .detail-item label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; display: block; margin-bottom: 4px; }
  .detail-item .value { font-size: 16px; color: #cbd5e1; }
  .detail-item a { color: #60a5fa; text-decoration: none; }
  .detail-item a:hover { text-decoration: underline; }
  .no-data { color: #f59e0b; font-size: 14px; }
  .linkedin-btn { display: inline-block; padding: 8px 20px; background: #2563eb; color: #fff; border-radius: 6px; font-size: 14px; font-weight: 500; text-decoration: none; }
  .linkedin-btn:hover { background: #1d4ed8; text-decoration: none; }

  /* Synthesis lines */
  .synthesis-line { font-size: 15px; font-style: italic; line-height: 1.5; padding: 6px 0; }
  .synthesis-person { color: #5eead4; }
  .synthesis-company { color: #fbbf24; }
  .synthesis-loading { color: #64748b; }

  /* Scrollable sections */
  .section { margin-bottom: 20px; }
  .section h3 { font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 8px; letter-spacing: 0.5px; }
  .scroll-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; padding: 12px 14px; max-height: 160px; overflow-y: auto; font-size: 14px; line-height: 1.6; color: #cbd5e1; white-space: pre-wrap; }
  .scroll-box.short { max-height: 120px; }
  .scroll-box.empty { color: #475569; font-style: italic; }

  /* Verdict */
  #verdict-section { margin-bottom: 20px; }
  #verdict-section h3 { font-size: 14px; text-transform: uppercase; color: #64748b; margin-bottom: 10px; letter-spacing: 0.5px; }
  .verdict-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .verdict-btn { padding: 10px 12px; width: 180px; border: 2px solid #334155; background: #1e293b; color: #cbd5e1; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .verdict-btn:hover { border-color: #64748b; }
  .verdict-btn .v-main { font-size: 14px; font-weight: 600; display: block; }
  .verdict-btn .v-sub { font-size: 11px; color: #64748b; display: block; margin-top: 3px; }
  .verdict-btn.selected { border-color: #3b82f6; background: #1e3a5f; }
  .verdict-btn.selected .v-sub { color: #93c5fd; }
  .verdict-btn.v-confirmed.selected { border-color: #22c55e; background: #14532d; color: #86efac; }
  .verdict-btn.v-wrong.selected { border-color: #ef4444; background: #7f1d1d; color: #fca5a5; }
  .verdict-btn.v-advisory.selected { border-color: #eab308; background: #713f12; color: #fde047; }
  .verdict-btn.v-portfolio.selected { border-color: #818cf8; background: #312e81; color: #a5b4fc; }

  #correct-company-row { margin-top: 10px; display: none; }
  #correct-company-row.show { display: block; }
  #correct-company-row label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 4px; }
  #correct-company-row input { width: 320px; padding: 8px 12px; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; font-size: 14px; }

  #notes-row { margin-top: 10px; }
  #notes-row label { font-size: 12px; text-transform: uppercase; color: #64748b; display: block; margin-bottom: 4px; letter-spacing: 0.5px; }
  #notes-row input { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; font-size: 14px; }

  #save-btn { margin-top: 16px; padding: 10px 28px; height: 40px; background: #2563eb; border: none; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
  #save-btn:hover { background: #1d4ed8; }
  #save-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  #save-status { font-size: 13px; color: #22c55e; margin-left: 14px; display: inline-block; }

  #export-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid #1e293b; }
  #export-section a { color: #60a5fa; font-size: 14px; font-weight: 500; text-decoration: none; }
  #export-section a:hover { text-decoration: underline; }
  #export-section .export-sub { font-size: 12px; color: #64748b; margin-top: 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Contact Eval</h2>
    <div id="review-counter">0 / 0 reviewed</div>
  </div>
  <div id="contact-list"></div>
</div>

<div id="main">
  <div id="top-bar">
    <span id="contact-counter">Contact 0 of 0</span>
    <div class="nav-btns">
      <button onclick="navPrev()">&larr; Previous</button>
      <button onclick="navNext()">Next &rarr;</button>
    </div>
  </div>

  <div id="identity">
    <h1 id="c-name">&mdash;</h1>
    <span class="badge badge-confidence" id="c-confidence"></span>
    <span class="badge badge-role" id="c-role"></span>
  </div>

  <div class="detail-grid">
    <div class="detail-item"><label>Job Title</label><div class="value" id="c-title">&mdash;</div></div>
    <div class="detail-item"><label>Company</label><div class="value" id="c-company">&mdash;</div></div>
    <div class="detail-item"><label>Email</label><div class="value" id="c-email">&mdash;</div></div>
    <div class="detail-item"><label>LinkedIn</label><div class="value" id="c-linkedin">&mdash;</div></div>
  </div>

  <div class="section">
    <div class="synthesis-line synthesis-person synthesis-loading" id="c-person-synthesis">Loading summary...</div>
    <h3>Full LinkedIn About</h3>
    <div class="scroll-box" id="c-linkedin-summary"></div>
  </div>

  <div class="section">
    <div class="synthesis-line synthesis-company synthesis-loading" id="c-company-focus">Loading focus...</div>
    <h3 id="company-section-title">About Company</h3>
    <div class="scroll-box short" id="c-company-desc"></div>
  </div>

  <div id="verdict-section">
    <h3>Your Verdict</h3>
    <div class="verdict-btns">
      <button class="verdict-btn v-confirmed" data-verdict="confirmed" onclick="selectVerdict('confirmed')">
        <span class="v-main">&#10003; Include</span>
        <span class="v-sub">Currently at this company</span>
      </button>
      <button class="verdict-btn v-wrong" data-verdict="wrong_company" onclick="selectVerdict('wrong_company')">
        <span class="v-main">&#10007; Wrong Company</span>
        <span class="v-sub">Not working here anymore</span>
      </button>
      <button class="verdict-btn v-advisory" data-verdict="advisory_only" onclick="selectVerdict('advisory_only')">
        <span class="v-main">&#9670; Advisory / Board</span>
        <span class="v-sub">Not full-time employed</span>
      </button>
      <button class="verdict-btn v-portfolio" data-verdict="portfolio_co" onclick="selectVerdict('portfolio_co')">
        <span class="v-main">&#11055; Portfolio Co</span>
        <span class="v-sub">Works at portfolio company, not the fund</span>
      </button>
    </div>
    <div id="correct-company-row">
      <label>Correct company name:</label>
      <input type="text" id="correct-company" placeholder="Enter correct company">
    </div>
    <div id="notes-row">
      <label>Notes (optional)</label>
      <input type="text" id="notes" placeholder="Add any observations...">
    </div>
  </div>

  <div>
    <button id="save-btn" onclick="saveVerdict()" disabled>Save &amp; Next &rarr;</button>
    <span id="save-status"></span>
  </div>

  <div id="export-section">
    <a href="/api/eval/export.csv">Export reviewed contacts &rarr;</a>
    <div class="export-sub">(downloads all reviewed contacts as CSV)</div>
  </div>
</div>

<script>
let contacts = [];
let verdicts = {};
let synthesisCache = {};
let currentIdx = 0;
let selectedVerdict = null;

async function init() {
  const [cResp, vResp] = await Promise.all([
    fetch('/api/eval/contacts').then(r => r.json()),
    fetch('/api/eval/verdicts').then(r => r.json()),
  ]);
  contacts = cResp.contacts || [];
  for (const v of (vResp.verdicts || [])) {
    verdicts[v.record_id] = v;
  }
  renderSidebar();
  if (contacts.length > 0) showContact(0);
  updateCounter();
}

function renderSidebar() {
  const list = document.getElementById('contact-list');
  list.innerHTML = '';
  contacts.forEach((c, i) => {
    const div = document.createElement('div');
    const isReviewed = !!verdicts[c.record_id];
    div.className = 'sidebar-item' + (isReviewed ? ' reviewed' : '') + (i === currentIdx ? ' active' : '');
    div.dataset.idx = i;

    let html = `<div class="sidebar-name">${esc(c.name || '\u2014')}`;
    if (isReviewed) html += `<span class="sidebar-check">\u2713</span>`;
    html += `</div>`;
    html += `<div class="sidebar-company">${esc(c.company_name || '\u2014')}</div>`;
    const v = verdicts[c.record_id];
    if (v) {
      const cls = { confirmed: 'badge-confirmed', wrong_company: 'badge-wrong', advisory_only: 'badge-advisory', portfolio_co: 'badge-portfolio' }[v.verdict] || '';
      const labels = { confirmed: 'Include', wrong_company: 'Wrong Co', advisory_only: 'Advisory', portfolio_co: 'Portfolio' };
      html += `<span class="sidebar-verdict-badge ${cls}">${esc(labels[v.verdict] || v.verdict)}</span>`;
    }
    div.innerHTML = html;
    div.onclick = () => showContact(i);
    list.appendChild(div);
  });
}

function showContact(idx) {
  if (idx < 0 || idx >= contacts.length) return;
  currentIdx = idx;
  const c = contacts[idx];

  document.getElementById('c-name').textContent = c.name || '\u2014';

  const confEl = document.getElementById('c-confidence');
  confEl.textContent = c.confidence ? `Match Confidence: ${c.confidence}` : '';
  confEl.style.display = c.confidence ? '' : 'none';

  const roleEl = document.getElementById('c-role');
  roleEl.textContent = c.role_type ? `Role: ${c.role_type}` : '';
  roleEl.style.display = c.role_type ? '' : 'none';

  document.getElementById('c-title').textContent = c.job_title || '\u2014';

  const companyEl = document.getElementById('c-company');
  if (c.company_url) {
    companyEl.innerHTML = `<a href="${esc(c.company_url)}" target="_blank">${esc(c.company_name || '\u2014')} &#8599;</a>`;
  } else {
    companyEl.textContent = c.company_name || '\u2014';
  }

  const emailEl = document.getElementById('c-email');
  if (c.email) {
    emailEl.innerHTML = `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`;
  } else {
    emailEl.innerHTML = `<span class="no-data">\u26A0 No email \u2014 needs sourcing</span>`;
  }

  const linkedinEl = document.getElementById('c-linkedin');
  if (c.linkedin_url) {
    linkedinEl.innerHTML = `<a class="linkedin-btn" href="${esc(c.linkedin_url)}" target="_blank">View LinkedIn Profile &rarr;</a>`;
  } else {
    linkedinEl.innerHTML = `<span class="no-data">\u26A0 No LinkedIn URL</span>`;
  }

  // LinkedIn summary
  const summaryEl = document.getElementById('c-linkedin-summary');
  if (c.linkedin_summary) {
    summaryEl.textContent = c.linkedin_summary;
    summaryEl.classList.remove('empty');
  } else {
    summaryEl.textContent = '(No LinkedIn summary available)';
    summaryEl.classList.add('empty');
  }

  // Company description
  const descEl = document.getElementById('c-company-desc');
  document.getElementById('company-section-title').textContent = `About ${c.company_name || 'Company'}`;
  if (c.company_description) {
    descEl.textContent = c.company_description;
    descEl.classList.remove('empty');
  } else {
    descEl.textContent = '(No company description available)';
    descEl.classList.add('empty');
  }

  // AI synthesis — async load
  loadSynthesis(c);

  // Restore existing verdict
  const existing = verdicts[c.record_id];
  selectedVerdict = existing?.verdict || null;
  document.getElementById('correct-company').value = existing?.correct_company || '';
  document.getElementById('notes').value = existing?.notes || '';

  document.querySelectorAll('.verdict-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.verdict === selectedVerdict);
  });
  document.getElementById('correct-company-row').classList.toggle('show', selectedVerdict === 'wrong_company');
  document.getElementById('save-btn').disabled = !selectedVerdict;

  document.getElementById('contact-counter').textContent = `Contact ${idx + 1} of ${contacts.length}`;
  document.getElementById('save-status').textContent = '';

  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const activeEl = document.querySelector('.sidebar-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
}

async function loadSynthesis(c) {
  const personEl = document.getElementById('c-person-synthesis');
  const companyEl = document.getElementById('c-company-focus');

  // Check cache first
  if (synthesisCache[c.record_id]) {
    const cached = synthesisCache[c.record_id];
    personEl.textContent = cached.person_synthesis || '';
    personEl.classList.toggle('synthesis-loading', false);
    companyEl.textContent = cached.company_focus || '';
    companyEl.classList.toggle('synthesis-loading', false);
    return;
  }

  // Show loading
  personEl.textContent = 'Loading summary...';
  personEl.classList.add('synthesis-loading');
  companyEl.textContent = 'Loading focus...';
  companyEl.classList.add('synthesis-loading');

  // Skip if no meaningful data to synthesise
  if (!c.linkedin_summary && !c.company_description) {
    personEl.textContent = '';
    companyEl.textContent = '';
    personEl.classList.remove('synthesis-loading');
    companyEl.classList.remove('synthesis-loading');
    return;
  }

  try {
    const resp = await fetch('/api/eval/synthesise', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: c.name,
        job_title: c.job_title,
        company_name: c.company_name,
        linkedin_summary: c.linkedin_summary || '',
        company_description: c.company_description || '',
      }),
    });
    const data = await resp.json();
    synthesisCache[c.record_id] = data;

    // Only update if still on same contact
    if (contacts[currentIdx]?.record_id === c.record_id) {
      personEl.textContent = data.person_synthesis || '';
      personEl.classList.remove('synthesis-loading');
      companyEl.textContent = data.company_focus || '';
      companyEl.classList.remove('synthesis-loading');
    }
  } catch {
    personEl.textContent = '';
    companyEl.textContent = '';
    personEl.classList.remove('synthesis-loading');
    companyEl.classList.remove('synthesis-loading');
  }
}

function selectVerdict(v) {
  selectedVerdict = v;
  document.querySelectorAll('.verdict-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.verdict === v);
  });
  document.getElementById('correct-company-row').classList.toggle('show', v === 'wrong_company');
  document.getElementById('save-btn').disabled = false;
}

async function saveVerdict() {
  if (!selectedVerdict) return;
  const c = contacts[currentIdx];
  const body = {
    record_id: c.record_id,
    name: c.name,
    verdict: selectedVerdict,
    correct_company: document.getElementById('correct-company').value || null,
    notes: document.getElementById('notes').value || null,
  };

  const resp = await fetch('/api/eval/verdict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (resp.ok) {
    verdicts[c.record_id] = body;
    document.getElementById('save-status').textContent = 'Saved';
    updateCounter();
    renderSidebar();

    // Auto-advance to next unreviewed
    setTimeout(() => {
      const nextUnreviewed = contacts.findIndex((c, i) => i > currentIdx && !verdicts[c.record_id]);
      if (nextUnreviewed >= 0) {
        showContact(nextUnreviewed);
      } else {
        const fromStart = contacts.findIndex(c => !verdicts[c.record_id]);
        if (fromStart >= 0) showContact(fromStart);
      }
    }, 300);
  } else {
    document.getElementById('save-status').textContent = 'Error saving';
  }
}

function updateCounter() {
  const reviewed = contacts.filter(c => verdicts[c.record_id]).length;
  document.getElementById('review-counter').textContent = `${reviewed} / ${contacts.length} reviewed`;
}

function navPrev() { if (currentIdx > 0) showContact(currentIdx - 1); }
function navNext() { if (currentIdx < contacts.length - 1) showContact(currentIdx + 1); }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ']') navNext();
  if (e.key === 'ArrowLeft' || e.key === '[') navPrev();
  if (e.key === 'Enter' && selectedVerdict) saveVerdict();
});

init();
</script>
</body>
</html>
